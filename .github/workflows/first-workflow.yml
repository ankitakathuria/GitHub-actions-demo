name: My first Workflow

on: 
  push:

jobs: 
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -la

      - name: Show Node Version
        run: node -v 

      - name: Run Javascript File
        run: node index.js
