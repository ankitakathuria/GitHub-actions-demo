name: Node CI Demo

on: 
  push:

jobs: 
  node-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: 22

      - name: Verify Node Version
        run: node -v

      - name: Run Start Script
        run: npm run start
         


