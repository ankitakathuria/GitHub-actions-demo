name: my-test-workflow

on:
  push:

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: 24
          cache: npm 

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        uses: actions/upload-artifact@v4
        with: 
          path: dist/




    