name: test-workflow

on:
  push:

jobs:
  checkout-code:
    runs-on: ubuntu-runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install Dependencies
        run: npm ci

      - name: Build Files
        run: npm run build

      - name: Test
        run: npm run test

      - name: Upload Atrifact
        uses: actions/upload-artifact@v4