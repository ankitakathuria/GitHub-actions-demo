name: Matrix-Strategy

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20,22,24]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
        run: node -vß

      